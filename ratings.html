    <style>
        :root {
            --bg: #1a1714;
            --bg-surface: #242019;
            --bg-elevated: #2e2a23;
            --text: #e8e0d4;
            --text-muted: #a89f91;
            --text-dim: #6b6358;
            --accent-teal: #50C9C3;
            --accent-red: #E8453C;
            --grade-gold: #D4A843;
            --border: rgba(168, 159, 145, 0.12);
            --border-hover: rgba(168, 159, 145, 0.25);

            --grade-a-bg: rgba(80, 201, 195, 0.15);
            --grade-a-border: rgba(80, 201, 195, 0.4);
            --grade-a-text: #50C9C3;
            --grade-b-bg: rgba(212, 168, 67, 0.15);
            --grade-b-border: rgba(212, 168, 67, 0.4);
            --grade-b-text: #D4A843;
            --grade-c-bg: rgba(210, 130, 50, 0.15);
            --grade-c-border: rgba(210, 130, 50, 0.4);
            --grade-c-text: #d28232;
            --grade-d-bg: rgba(232, 69, 60, 0.15);
            --grade-d-border: rgba(232, 69, 60, 0.4);
            --grade-d-text: #E8453C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ---- Grade Badges ---- */
        .grade {
            font-family: 'Bangers', cursive;
            display: inline-block;
            letter-spacing: 1px;
            border-radius: 4px;
            line-height: 1;
        }

        .grade-sm {
            font-size: 0.95rem;
            padding: 0.2rem 0.45rem;
        }

        .grade-a { color: var(--grade-a-text); background: var(--grade-a-bg); border: 1px solid var(--grade-a-border); }
        .grade-b { color: var(--grade-b-text); background: var(--grade-b-bg); border: 1px solid var(--grade-b-border); }
        .grade-c { color: var(--grade-c-text); background: var(--grade-c-bg); border: 1px solid var(--grade-c-border); }
        .grade-d { color: var(--grade-d-text); background: var(--grade-d-bg); border: 1px solid var(--grade-d-border); }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZGVmcz48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC43NSIgbnVtT2N0YXZlcz0iNCIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvZmlsdGVyPjwvZGVmcz48cmVjdCB3aWR0aD0iMzAwIiBoZWlnaHQ9IjMwMCIgZmlsdGVyPSJ1cmwoI24pIiBvcGFjaXR5PSIwLjA4Ii8+PC9zdmc+');
            pointer-events: none;
            z-index: 9999;
            opacity: 0.5;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ---- Nav ---- */
        .site-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 23, 20, 0.92);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text);
            flex-shrink: 0;
        }

        .nav-logo {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            object-fit: contain;
        }

        .nav-title {
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: var(--text);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.4rem 0.7rem;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--bg-elevated);
        }

        .nav-link svg { width: 16px; height: 16px; }

        /* ---- Content ---- */
        .content {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ---- Page Header ---- */
        .page-header {
            padding: 3rem 0 2rem;
            text-align: center;
        }

        .page-title {
            font-family: 'Bangers', cursive;
            font-size: clamp(2rem, 5vw, 3rem);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ---- Filters ---- */
        .filters {
            padding: 1.5rem 0 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .search-input {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .search-input:focus {
            border-color: var(--accent-teal);
        }

        .grade-toggles {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .grade-toggle {
            padding: 0.4rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 100px;
            background: transparent;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .grade-toggle:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        .grade-toggle.active {
            background: var(--bg-elevated);
            border-color: var(--accent-teal);
            color: var(--accent-teal);
        }

        /* ---- Results Info ---- */
        .results-info {
            font-size: 0.8rem;
            color: var(--text-dim);
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* ---- Episode Cards ---- */
        .episodes-list {
            padding: 0 0 4rem;
        }

        .episode-card {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 1.5rem;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }

        .episode-card:last-child {
            border-bottom: none;
        }

        .episode-card:hover {
            padding-left: 0.5rem;
        }

        .episode-card:hover .card-title {
            color: var(--accent-teal);
        }

        /* Thumbnail with grade overlay */
        .card-thumb-wrap {
            width: 72px;
            height: 100px;
            border-radius: 8px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
        }

        .card-thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Fallback when no image: show grade centered */
        .card-thumb-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-thumb-fallback .grade {
            font-size: 1.9rem;
            padding: 0.2rem 0.4rem;
            transform: rotate(-2deg);
            border: none;
            background: transparent;
        }

        .card-thumb-wrap.anchor-a { background: var(--grade-a-bg); border-color: var(--grade-a-border); }
        .card-thumb-wrap.anchor-b { background: var(--grade-b-bg); border-color: var(--grade-b-border); }
        .card-thumb-wrap.anchor-c { background: var(--grade-c-bg); border-color: var(--grade-c-border); }
        .card-thumb-wrap.anchor-d { background: var(--grade-d-bg); border-color: var(--grade-d-border); }

        /* Grade badge overlay on thumbnail */
        .card-grade-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            z-index: 2;
        }

        .card-grade-badge .grade {
            font-size: 0.75rem;
            padding: 0.15rem 0.35rem;
            transform: rotate(2deg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .card-body {
            min-width: 0;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            transition: color 0.2s;
        }

        .card-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
        }

        .card-host-grades {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .card-host-grade {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .card-host-grade .host-label {
            color: var(--text-dim);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-host-grade .grade {
            font-size: 1.25rem;
            padding: 0.25rem 0.5rem;
        }

        .card-listen {
            flex-shrink: 0;
        }

        .listen-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .listen-link:hover {
            color: var(--accent-teal);
            border-color: var(--accent-teal);
        }

        .listen-link svg {
            width: 14px;
            height: 14px;
        }

        /* ---- No Results ---- */
        .no-results {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-dim);
            display: none;
        }

        .no-results.visible {
            display: block;
        }

        /* ---- Footer ---- */
        .site-footer {
            border-top: 1px solid var(--border);
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 2rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-link:hover { color: var(--accent-teal); }

        .footer-dot {
            color: var(--text-dim);
            font-size: 0.6rem;
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .footer-social a {
            color: var(--text-dim);
            transition: color 0.2s;
        }

        .footer-social a:hover { color: var(--accent-red); }
        .footer-social svg { width: 20px; height: 20px; }

        .footer-production {
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 0.3rem;
        }

        .footer-tagline {
            font-style: italic;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        /* ---- Animations ---- */
        .fade-in {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .site-nav { padding: 0.6rem 1rem; }
            .nav-link span { display: none; }

            .content { padding: 0 1.25rem; }

            .episode-card {
                grid-template-columns: auto 1fr;
                gap: 1rem;
            }

            .card-listen {
                grid-column: 1 / -1;
            }

            .listen-link {
                width: 100%;
                justify-content: center;
            }

            .card-thumb-wrap {
                width: 56px;
                height: 78px;
            }

            .card-thumb-fallback .grade {
                font-size: 1.3rem;
            }

            .card-title {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .grade-toggles {
                justify-content: center;
            }
        }
    </style>
</head>

    function hostGradeBadge(label, grade) {
        if (!grade) return '';
        return `<div class="card-host-grade">
            <span class="host-label">${label}</span>
            <span class="grade grade-sm grade-${gc(grade)}">${grade}</span>
        </div>`;
    }

    function renderEpisodes(episodes) {
        // Filter out specials without grades
        const showable = episodes.filter(ep => !ep.isSpecial);

        container.innerHTML = showable.map(ep => {
            const overallClass = gc(ep.overallGrade);
            const metaParts = [`Ep ${ep.number}`];
            if (ep.dateFormatted) metaParts.push(ep.dateFormatted);
            if (ep.genre) metaParts.push(ep.genre.split(',')[0].trim());

            const hostGrades = [
                hostGradeBadge('Joshua', ep.jrGrade),
                hostGradeBadge('Greg', ep.gregGrade),
                hostGradeBadge('Brian', ep.brianGrade),
            ].filter(Boolean).join('');

            const epUrl = ep.spotifyUrl || SPOTIFY_URL;
            const gradeBadge = ep.overallGrade
                ? `<div class="card-grade-badge"><span class="grade grade-${overallClass}">${ep.overallGrade}</span></div>`
                : '';
            const thumbContent = ep.thumbnailUrl
                ? `<img src="${ep.thumbnailUrl}" alt="${ep.title}" loading="lazy">${gradeBadge}`
                : (ep.overallGrade
                    ? `<div class="card-thumb-fallback"><span class="grade grade-${overallClass}">${ep.overallGrade}</span></div>`
                    : `<div class="card-thumb-fallback"><span style="color: var(--text-dim); font-size: 0.8rem;">—</span></div>`);
            const thumbClass = !ep.thumbnailUrl && overallClass ? `anchor-${overallClass}` : '';

            return `<div class="episode-card fade-in" id="ep${ep.number}" data-grade="${ep.overallGrade || ''}" data-title="${ep.title}" data-meta="${ep.title} ${ep.subtitle} ${ep.genre} ${ep.type} Ep ${ep.number}">
                <div class="card-thumb-wrap ${thumbClass}">
                    ${thumbContent}
                </div>
                <div class="card-body">
                    <div class="card-title">${ep.title}</div>
                    <div class="card-meta">${metaParts.join(' · ')}</div>
                    ${hostGrades ? `<div class="card-host-grades">${hostGrades}</div>` : ''}
                </div>
                <div class="card-listen">
                    <a href="${epUrl}" target="_blank" class="listen-link">${SPOTIFY_SVG} Listen</a>
                </div>
            </div>`;
        }).join('');

        allCards = Array.from(container.querySelectorAll('.episode-card'));
        resultsInfo.textContent = `Showing all ${allCards.length} episodes`;

        // Observe fade-ins
        container.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    }

    function applyFilters() {
        const term = searchInput.value.toLowerCase().trim();
        const activeGrade = gradeToggles.querySelector('.grade-toggle.active')?.dataset.grade || 'all';
        let visible = 0;

        allCards.forEach(card => {
            const title = (card.dataset.title || '').toLowerCase();
            const meta = (card.dataset.meta || '').toLowerCase();
            const grade = (card.dataset.grade || '').replace(/[+-]/g, '');

            const matchesSearch = !term || title.includes(term) || meta.includes(term);
            const matchesGrade = activeGrade === 'all' || grade.toLowerCase() === activeGrade.toLowerCase();

            if (matchesSearch && matchesGrade) {
                card.style.display = '';
                visible++;
            } else {
                card.style.display = 'none';
            }
        });

        if (term || activeGrade !== 'all') {
            resultsInfo.textContent = `Showing ${visible} of ${allCards.length} episodes`;
        } else {
            resultsInfo.textContent = `Showing all ${allCards.length} episodes`;
        }
        noResults.classList.toggle('visible', visible === 0);
    }

    // ---- Sorting ----
    function getEpScore(ep) {
        const nums = [ep.gregGrade, ep.brianGrade, ep.jrGrade]
            .map(RTS.gradeToNumber).filter(n => n !== null);
        return nums.length ? nums.reduce((a, b) => a + b, 0) / nums.length : -999;
    }

    function getEpSpread(ep) {
        const nums = [ep.gregGrade, ep.brianGrade, ep.jrGrade]
            .map(RTS.gradeToNumber).filter(n => n !== null);
        if (nums.length < 2) return 0;
        return Math.max(...nums) - Math.min(...nums);
    }

    function sortEpisodes(episodes, sortBy) {
        const sorted = [...episodes];
        switch (sortBy) {
            case 'grade-high':
                sorted.sort((a, b) => getEpScore(b) - getEpScore(a));
                break;
            case 'grade-low':
                sorted.sort((a, b) => getEpScore(a) - getEpScore(b));
                break;
            case 'controversial':
                sorted.sort((a, b) => getEpSpread(b) - getEpSpread(a));
                break;
            default: // date
                sorted.sort((a, b) => b.numericNumber - a.numericNumber);
        }
        return sorted;
    }

    function rerender(sortBy) {
        const sorted = sortEpisodes(loadedEpisodes, sortBy);
        renderEpisodes(sorted);
        applyFilters();
    }

    searchInput.addEventListener('input', applyFilters);

    gradeToggles.addEventListener('click', e => {
        const btn = e.target.closest('.grade-toggle');
        if (!btn) return;
        gradeToggles.querySelectorAll('.grade-toggle').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    });

    sortToggles.addEventListener('click', e => {
        const btn = e.target.closest('.grade-toggle');
        if (!btn) return;
        sortToggles.querySelectorAll('.grade-toggle').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        rerender(btn.dataset.sort);
    });

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });

    // Load data
    RTS.fetchEpisodes().then(async episodes => {
        episodes = await RTS.enrichWithPosters(episodes);
        loadedEpisodes = episodes;
        renderEpisodes(episodes);

        // Deep link: scroll to episode if hash present
        if (window.location.hash) {
            const target = document.querySelector(window.location.hash);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.style.borderColor = 'var(--accent-teal)';
                setTimeout(() => { target.style.borderColor = ''; }, 3000);
            }
        }
    }).catch(err => {
        console.error('Failed to load episodes:', err);
        container.innerHTML = '<div style="color: var(--accent-red);">Could not load episodes. Please try again later.</div>';
    });
</script>
</body>
</html>
